name: worklog_studio_style_system
description: "A new Flutter package project."
publish_to: none
resolution: workspace
version: 0.0.5
homepage:

environment:
  sdk: ^3.8.1
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter

  # Widgets
  cached_network_image: ^3.4.1
  modal_bottom_sheet: ^3.0.0
  
  # Helpers
  vector_svg: 
    path: ../vector_svg
  intl: ^0.20.2
  flutter_reorderable_grid_view: ^5.5.0
  easy_mask: ^2.0.1
  # country_flags: ^1.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.15
  flutter_gen_runner: ^5.10.0

flutter_gen:
  output: lib/resources
  line_length: 120
  
  assets:
    outputs:
      package_parameter_enabled: true
      class_name: WorklogStudioAssets
  fonts:
    outputs:
      class_name: WorklogStudioFontFamily

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/vectors/
    - assets/images/m-size/
    - assets/images/s-size/
    - assets/images/preview/

  fonts:
    - family: NunitoSans
      fonts:
        - asset: fonts/nunito_sans/NunitoSans-ExtraLight.ttf
          weight: 200
        - asset: fonts/nunito_sans/NunitoSans-Light.ttf
          weight: 300
        - asset: fonts/nunito_sans/NunitoSans-Regular.ttf
          weight: 400
        - asset: fonts/nunito_sans/NunitoSans-SemiBold.ttf
          weight: 600
        - asset: fonts/nunito_sans/NunitoSans-Bold.ttf
          weight: 700
        - asset: fonts/nunito_sans/NunitoSans-ExtraBold.ttf
          weight: 800
        - asset: fonts/nunito_sans/NunitoSans-Black.ttf
          weight: 900
